<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Profile / Void Avatar Lounge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="crt accent-cyan">

  <div class="page-shell">
    <header class="window window-top">
      <div class="window-titlebar">
        <span class="title-dot">✥</span>
        <span>MORPHENE // SOUL PROFILE</span>
        <span class="title-right">sigil modification</span>
      </div>
      <div class="window-body window-body-split">
        <div class="panel panel-left">
          <h1 class="section-title">The Vessel's Record</h1>
          <div class="nav-links">
            <a href="index.html">The Gateway</a>
            <a href="avatar.html">Avatar Room</a>
            <a href="inventory.html">Inventory</a>
            <a href="market.html">Bazaar</a>
          </div>
          <div class="status-box">
            <div class="status-line">SOUL: <span id="user-email"></span></div>
            <div class="status-line">MANA: <span id="user-coins"></span></div>
          </div>

          <div class="sub-window">
            <div class="sub-window-titlebar">active manifestation</div>
            <div class="sub-window-body profile-card" id="profile-card">
              <div class="profile-name" id="profile-name">scrying...</div>
              <div class="profile-meta">
                <span id="profile-pronouns"></span>
                <span id="profile-status"></span>
              </div>
              <div class="profile-tagline" id="profile-tagline"></div>
              <div class="profile-bio" id="profile-bio"></div>
            </div>
          </div>
        </div>

        <div class="panel panel-right">
          <div class="sub-window">
            <div class="sub-window-titlebar">alter the soul</div>
            <div class="sub-window-body">
              <form id="profile-form">
                <label>
                  manifestation name
                  <input id="display-name" maxlength="32" placeholder="The Nameless One" required>
                </label>
                <label>
                  pronouns of essence
                  <input id="pronouns" maxlength="24" placeholder="they/them/void">
                </label>
                <label>
                  ethereal status
                  <input id="status" maxlength="32" placeholder="haunting the grid">
                </label>
                <label>
                  arcane tagline
                  <input id="tagline" maxlength="64" placeholder="necromantic layer stacker">
                </label>
                <label>
                  sacred bio
                  <textarea id="bio" rows="3" maxlength="240" placeholder="speak of your history"></textarea>
                </label>
                <div class="filter-bar">
                  <label>
                    vision mode
                    <select id="theme">
                      <option value="crt">scrying glow</option>
                      <option value="clean">crystal clear</option>
                    </select>
                  </label>
                  <label>
                    soul accent
                    <select id="accent">
                      <option value="red">blood</option>
                      <option value="cyan">soul</option>
                      <option value="violet">void</option>
                      <option value="lime">slime</option>
                    </select>
                  </label>
                </div>
                <button type="submit" class="btn">commit changes</button>
                <div id="profile-error" class="error-text"></div>
                <div id="profile-success" class="hint-text"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </header>

    <footer class="footer-bar">
      <span>MORPHENE v0.1-necro</span>
      <span>dungeon-wizard core. firebase grimoire.</span>
      <span>tread carefully.</span>
    </footer>
  </div>

  <script type="module" src="js/profile.js"></script>
</body>
</html>
